<div class="container mx-auto py-3 px-10 sm:px-0 flex justify-between">
  <h1 class="text-xl font-medium">Meal Cart</h1>
  <nav>
    <ul class="flex gap-6">
      <li>
        <a routerLink="dishes"
           routerLinkActive="bg-gray-200"
           class="text-cyan-700 hover:bg-gray-200 focus:bg-gray-200 p-2 rounded cursor-pointer">Страви</a>
      </li>
      <li>
        <a routerLink="cart"
           routerLinkActive="bg-gray-200"
           class="text-cyan-700 hover:bg-gray-200 focus:bg-gray-200 p-2 rounded cursor-pointer">
          Кошик
          @if (cartService.totalDishesInCart()) {
            <span class="ml-1 inline-flex items-center justify-center rounded-full bg-green-500 text-white size-6 text-xs">{{ cartService.totalDishesInCart() }}</span>
          }
        </a>
      </li>
    </ul>
  </nav>
</div>

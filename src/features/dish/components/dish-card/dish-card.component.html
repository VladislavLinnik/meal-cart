<section class="p-3 border bg-white dark:text-gray-800 border-gray-300 mb-3 rounded-xl">
  <div class="mb-2 flex justify-between">
    <h3 class="first-letter:uppercase text-lg mr-2">{{ dish().name }}</h3>
    <div class="flex justify-between items-start gap-3">
      <button class="btn size-6 flex justify-center items-center"
              [routerLink]="[dish().id]">
        <ng-icon name="heroPencil" />
      </button>
      <button class="btn-dismiss size-6 flex justify-center items-center"
              (click)="remove.emit(dish().id)">
        <ng-icon name="heroTrash" />
      </button>

      @if(!isInCart()) {
        <button class="btn size-6 flex justify-center items-center"
                (click)="addToCart.emit(dish())">
          <ng-icon name="heroShoppingCart" />
        </button>
      } @else {
        <button class="btn-dismiss size-6 flex justify-center items-center"
                (click)="removeFromCart.emit(dish().id)">
          <ng-icon name="heroShoppingCart" />
        </button>
      }
    </div>
  </div>
  <div class="flex flex-wrap gap-3">
    @for (ingredient of dish().ingredients; track $index) {
      <div class="bg-green-100 text-green-700 rounded py-0.5 px-2">{{ ingredient | appDishIngredient }}</div>
    }
  </div>
</section>

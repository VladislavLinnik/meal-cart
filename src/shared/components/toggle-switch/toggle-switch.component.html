<label class="relative inline-flex items-center cursor-pointer text-gray-700 dark:text-white gap-x-3">
  <input type="checkbox" class="sr-only peer"
         [(ngModel)]="model"
         (ngModelChange)="onChange($event)"
         [id]="id()"
         [name]="name() || id()" />
  <div class="w-10 h-6 bg-gray-300 rounded-full peer peer-checked:bg-cyan-600 transition-colors duration-200"></div>
  <span class="absolute left-1 top-1 size-4 bg-white rounded-full transition-transform duration-200 ease-in-out peer-checked:translate-x-4"></span>
  @if (label()) {
    {{ label() }}
  }
</label>
